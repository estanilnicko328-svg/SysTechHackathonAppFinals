<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcernTrack - Student Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Firebase SDKs (optional if you want backend sync) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
    <!-- Student Auth Overlay -->
    <div class="auth-overlay" id="studentAuth">
        <a class="overlay-back" href="index.html">← Back</a>
        <div class="auth-box">
            <a href="index.html" class="auth-logo" title="Back to Home">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="64" height="64" rx="16" fill="url(#logoGrad)"/>
                    <path d="M20 32C20 25.3726 25.3726 20 32 20C38.6274 20 44 25.3726 44 32C44 38.6274 38.6274 44 32 44" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="32" cy="32" r="4" fill="white"/>
                    <path d="M32 44L26 50M32 44L38 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4f46e5"/>
                            <stop offset="1" stop-color="#7c3aed"/>
                        </linearGradient>
                    </defs>
                </svg>
            </a>
            <h2 id="authTitle">Student Login</h2>
            <p>Enter your credentials to access the student portal.</p>

            <!-- Login Form -->
            <form id="loginForm" style="display:block;">
                <input type="text" id="loginStudentId" placeholder="Student ID" autocomplete="off" required />
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="off" required />
                <button type="submit" id="loginBtn">Login</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display:none;">
                <input type="text" id="regName" placeholder="Full Name" autocomplete="off" required />
                <input type="text" id="regStudentId" placeholder="Student ID" autocomplete="off" required />
                <input type="password" id="regPassword" placeholder="Password" autocomplete="off" required />
                <button type="submit" id="registerBtn">Register</button>
            </form>

            <p class="auth-error" id="studentAuthError" style="display:none;"></p>
            <p id="authToggle" style="margin-top:15px;">
                No account? <a href="#" onclick="showAuthForm('register'); return false;">Register</a>
            </p>
        </div>
    </div>

    <!-- Main Student Content -->
    <div class="container" id="studentContent" style="display:none;">
        <header>
            <h1>ConcernTrack</h1>
            <p>Student Portal</p>
            <a class="home-btn" href="index.html" title="Back to Home">Home</a>
            <div class="header-actions">
                <span id="userBadge" class="user-badge" style="display:none;"></span>
                <button id="studentLogoutBtn" class="logout-btn">Logout</button>
            </div>
        </header>

        <h2>Submit New Concern</h2>
        <form id="concernForm">
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Academic">Academic</option>
                <option value="Financial">Financial</option>
                <option value="Welfare">Welfare</option>
            </select>
            <select id="program" required>
                <option value="">Select Program</option>
                <!-- Options are populated dynamically based on selected category -->
            </select>
            <textarea id="description" placeholder="Describe your concern..." required></textarea>
            <input type="file" id="attachment" accept=".pdf,.doc,.jpg">
            <div class="form-bottom-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="anonymous"> 
                    <span>Submit Anonymously</span>
                </label>
                <button type="submit">Submit Concern</button>
            </div>
        </form>

        <h3>Your Concerns</h3>
        <div id="studentConcerns"></div>

        <div id="notifications"></div>

        <!-- AI ChatBot UI -->
        <button id="chatToggle" class="chat-toggle">💬</button>
        <div id="chatContainer" class="chat-container">
            <div class="chat-header">
                <span>AI Assistant</span>
                <button id="chatClose" class="chat-close">×</button>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-container">
                <input type="text" id="chatInput" placeholder="Type message...">
                <button id="chatSendBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="chat.js"></script>
    <script>
        // Wire up auth form events after DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const logoutBtn = document.getElementById('studentLogoutBtn');

            if (loginForm) {
                loginForm.addEventListener('submit', handleStudentLogin);
            }
            if (registerForm) {
                registerForm.addEventListener('submit', handleStudentRegister);
            }
            if (logoutBtn) {
                logoutBtn.addEventListener('click', handleStudentLogout);
            }
        });
    </script>
</body>
</html>
