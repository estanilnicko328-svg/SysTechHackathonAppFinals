<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConcernTrack - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Firebase SDKs (optional if you want backend sync) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-analytics-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="auth-overlay" id="adminAuth">
        <a class="overlay-back" href="index.html">← Back</a>
        <div class="auth-box">
            <a href="index.html" class="auth-logo" title="Back to Home">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="64" height="64" rx="16" fill="url(#logoGrad)"/>
                    <path d="M20 32C20 25.3726 25.3726 20 32 20C38.6274 20 44 25.3726 44 32C44 38.6274 38.6274 44 32 44" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    <circle cx="32" cy="32" r="4" fill="white"/>
                    <path d="M32 44L26 50M32 44L38 50" stroke="white" stroke-width="4" stroke-linecap="round"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4f46e5"/>
                            <stop offset="1" stop-color="#7c3aed"/>
                        </linearGradient>
                    </defs>
                </svg>
            </a>
            <h2 id="adminAuthTitle">Admin Login</h2>
            <p>Enter your admin credentials to access the dashboard.</p>

            <!-- Admin Login Form -->
            <form id="adminLoginForm" style="display:block;">
                <input type="text" id="adminUsername" placeholder="Username" autocomplete="off" required />
                <input type="password" id="adminPassword" placeholder="Password" autocomplete="off" required />
                <button id="adminLoginBtn" type="submit">Login</button>
            </form>

            <!-- Admin Register Form -->
            <form id="adminRegisterForm" style="display:none;">
                <input type="text" id="adminRegName" placeholder="Full Name" autocomplete="off" required />
                <input type="text" id="adminRegUsername" placeholder="Username" autocomplete="off" required />
                <input type="password" id="adminRegPassword" placeholder="Password" autocomplete="off" required />
                <button id="adminRegisterBtn" type="submit">Register</button>
            </form>

            <p class="auth-error" id="authError" style="display:none;"></p>
            <p id="adminAuthToggle" style="margin-top:15px;">
                No admin account? <a href="#" onclick="showAdminAuthForm('register'); return false;">Register</a>
            </p>
        </div>
    </div>

    <div class="container" id="adminContent">
        <header>
            <h1>ConcernTrack</h1>
            <p>Admin Dashboard</p>
            <div class="header-actions">
                <span class="user-badge" id="adminUserBadge">👤 <span id="adminUserName"></span></span>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </header>

        <div class="metrics">
            <div class="metric-card">
                <h3>Total Concerns</h3>
                <span id="totalConcerns">0</span>
            </div>
            <div class="metric-card">
                <h3>Avg Response Time</h3>
                <span id="avgResponse">0h</span>
            </div>
            <div class="metric-card">
                <h3>Escalation Rate</h3>
                <span id="escalationRate">0%</span>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="statusChart" width="280" height="180"></canvas>
        </div>
        <div class="controls">
            <button onclick="exportCSV()">Export CSV</button>
            <button onclick="exportPDF()">Export PDF</button>
        </div>

        <h3>All Concerns</h3>
        <div class="admin-filters">
            <input type="text" id="searchStudent" placeholder="Search by student name...">
            <button onclick="filterConcerns()">Search</button>
            <button onclick="clearFilter()">Clear</button>
        </div>
        <div id="adminConcerns"></div>

        <div id="notifications"></div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script src="dashboard.js"></script>
    <script>
        // Seed default admin if none exist
        function seedDefaultAdmin() {
            const admins = users.filter(u => u.role === 'admin');
            if (admins.length === 0) {
                users.push({
                    name: 'System Admin',
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    registeredAt: Date.now()
                });
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            }
        }

        function showAdminAuthForm(form) {
            const loginForm = document.getElementById('adminLoginForm');
            const registerForm = document.getElementById('adminRegisterForm');
            const title = document.getElementById('adminAuthTitle');
            const toggle = document.getElementById('adminAuthToggle');
            const error = document.getElementById('authError');

            if (error) error.style.display = 'none';

            if (form === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                title.textContent = 'Admin Register';
                toggle.innerHTML = 'Already have an account? <a href="#" onclick="showAdminAuthForm(\'login\'); return false;">Login</a>';
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                title.textContent = 'Admin Login';
                toggle.innerHTML = 'No admin account? <a href="#" onclick="showAdminAuthForm(\'register\'); return false;">Register</a>';
            }
        }

        function checkAdminAccess() {
            const overlay = document.getElementById('adminAuth');
            const content = document.getElementById('adminContent');
            const userNameEl = document.getElementById('adminUserName');

            if (isAdminAuthenticated()) {
                overlay.style.display = 'none';
                content.style.display = 'block';
                if (userNameEl) userNameEl.textContent = currentUser.name;

                if (typeof updateMetrics === 'function') updateMetrics();
                if (typeof renderAdminView === 'function') renderAdminView();
                return true;
            }

            overlay.style.display = 'flex';
            content.style.display = 'none';
            showAdminAuthForm('login');
            return false;
        }

        function attemptAdminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const error = document.getElementById('authError');

            const result = loginAdmin(username, password);
            if (result.success) {
                error.style.display = 'none';
                checkAdminAccess();
            } else {
                error.textContent = result.message;
                error.style.display = 'block';
            }
        }

        function attemptAdminRegister() {
            const name = document.getElementById('adminRegName').value;
            const username = document.getElementById('adminRegUsername').value;
            const password = document.getElementById('adminRegPassword').value;
            const error = document.getElementById('authError');

            const result = registerAdmin(name, username, password);
            if (result.success) {
                error.textContent = result.message;
                error.style.color = '#16a34a';
                error.style.display = 'block';
                setTimeout(() => {
                    error.style.color = '';
                    showAdminAuthForm('login');
                }, 1500);
            } else {
                error.textContent = result.message;
                error.style.color = '';
                error.style.display = 'block';
            }
        }

        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            attemptAdminLogin();
        });

        document.getElementById('adminRegisterForm').addEventListener('submit', (e) => {
            e.preventDefault();
            attemptAdminRegister();
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            logoutUser();
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
            document.getElementById('authError').style.display = 'none';
            checkAdminAccess();
        });

        window.addEventListener('DOMContentLoaded', () => {
            initApp();
            seedDefaultAdmin();
            checkAdminAccess();
        });
    </script>
</body>
</html>
